name: CI

on:
  push:
    branches:
      - dev
      - main

  pull_request:
    branches:
      - dev
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKER_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:

  gitleaks:
    name: GitLeaks Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint-test:
    name: Lint and Test Backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: true

      - name: Go fmt
        run: |
          test -z "$(gofmt -l .)"

      - name: Go vet
        run: go vet ./...

      - name: Run tests
        run: go test ./... -v

  sast:
    name: SAST Scan (GoSec)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run GoSec
        uses: securego/gosec@v2.22.4
        with:
          args: -severity medium ./backend/...

  trivy-fs:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: HIGH,CRITICAL

  docker:
    name: Build and Push Images
    runs-on: ubuntu-latest

    needs:
      - gitleaks
      - lint-test
      - sast
      - trivy-fs

    strategy:
      matrix:
        service:
          - backend
          - frontend

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-${{ matrix.service }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-${{ matrix.service }}:${{ github.sha }}

          cache-from: type=gha
          cache-to: type=gha,mode=max

  trivy-image:
    name: Trivy Image Scan
    runs-on: ubuntu-latest

    needs:
      - docker

    strategy:
      matrix:
        service:
          - backend
          - frontend

    steps:
      - uses: actions/checkout@v4

      - name: Scan Docker Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-${{ matrix.service }}:${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL
